name: Sleeper Current Snapshot

on:
  workflow_dispatch:
    inputs:
      force_refresh_players:
        description: "Force refresh the local Sleeper NFL player cache"
        required: false
        default: false
        type: boolean
  schedule:
    # GitHub Actions cron uses UTC. This is 6:17 AM Central during daylight time.
    - cron: "17 11 * * *"

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.12"

jobs:
  snapshot:
    name: Generate current Sleeper snapshot
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Generate base snapshot
        env:
          FORCE_REFRESH_PLAYERS: ${{ github.event_name == 'workflow_dispatch' && inputs.force_refresh_players || 'false' }}
        run: |
          if [ "$FORCE_REFRESH_PLAYERS" = "true" ]; then
            python scripts/sleeper_snapshot.py --force-refresh-players
          else
            python scripts/sleeper_snapshot.py
          fi

      - name: Add transaction data
        env:
          FORCE_REFRESH_PLAYERS: ${{ github.event_name == 'workflow_dispatch' && inputs.force_refresh_players || 'false' }}
        run: |
          if [ "$FORCE_REFRESH_PLAYERS" = "true" ]; then
            python scripts/sleeper_transactions.py --force-refresh-players
          else
            python scripts/sleeper_transactions.py
          fi

      - name: Add draft and traded-pick data
        env:
          FORCE_REFRESH_PLAYERS: ${{ github.event_name == 'workflow_dispatch' && inputs.force_refresh_players || 'false' }}
        run: |
          if [ "$FORCE_REFRESH_PLAYERS" = "true" ]; then
            python scripts/sleeper_drafts.py --force-refresh-players
          else
            python scripts/sleeper_drafts.py
          fi

      - name: Validate base snapshot
        run: python scripts/validate_snapshot.py

      - name: Validate transactions
        run: python scripts/validate_transactions.py

      - name: Validate drafts and traded picks
        run: python scripts/validate_drafts.py

      - name: Commit current snapshot changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/current

          if git diff --cached --quiet; then
            echo "No current snapshot changes to commit."
          else
            git commit -m "Update Sleeper current snapshot"
            git push
          fi
